<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Игровой Портал</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        h1 { color: #ffcc00; }
        .game-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .game-card {
            background: #2a2a2a;
            border: 3px solid #ffcc00;
            border-radius: 10px;
            padding: 20px;
            width: 200px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }
        .game-card:hover {
            transform: scale(1.05);
            background: #3a3a3a;
        }
    </style>
</head>
<body>

    <h1>Простой сайт, выбери игру в которую будешь играть</h1>
    
    <div class="game-grid">
        <!-- Кнопка для Джетпака из GDevelop -->
        <a href="./jetpack/index.html" class="game-card">
            <p>Artemiu's Jetpack</p>
            <span>🕹️ Играть</span>
        </a>

        <!-- Кнопка для будущего Платформера из GameMaker -->
        <a href="./platformer/index.html" class="game-card">
            <p>Kakish Tower: Rekakish</p>
            <span>🎮 Скоро!</span>
        </a>
    </div>

</body>
</html>
